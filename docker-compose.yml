services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins-local
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./:/var/jenkins_home/workspace/sample-python-pipeline
    environment:
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped

volumes:
  jenkins_data:
